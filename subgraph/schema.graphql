type GlobalStat @entity {
  id: ID!
  totalDonors: Int!
  totalRequesters: Int!
}

type Goal @entity(immutable: false) {
  id: ID!
  goalId: BigInt!
  creator: Bytes!
  category: String!
  description: String!
  targetAmount: BigInt!
  amountRaised: BigInt!
  status: String!
  flagsCount: Int!
  completed: Boolean!
}

type Donor @entity(immutable: false) {
  id: ID!
  totalDonated: BigInt!
  goalsSupported: Int!
  successfulGoalsSupported: Int!
  reputation: BigInt!
  globalRank: BigInt
  percentileRank: BigDecimal
}

type Requester @entity(immutable: false) {
  id: ID!
  completedGoals: Int!
  unmetProofs: Int!
  flaggedGoals: Int!
  reputation: BigInt!
  globalRank: BigInt
  percentileRank: BigDecimal
}

