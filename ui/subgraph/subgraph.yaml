specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ImpactPay
    network: celo-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ImpactPay
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Goal
        - Donor
        - Requester
      abis:
        - name: ImpactPay
          file: ./abis/ImpactPay.json
      eventHandlers:
        - event: GoalCreated(indexed uint256,indexed address,uint8,uint256,bytes,string,address,string)
          handler: handleGoalCreated
        - event: Funded(indexed uint256,indexed address,uint256,uint256,uint8,string)
          handler: handleFunded
        - event: BillGoalFulfilled(indexed uint256,indexed address,indexed address,uint256,bytes,uint256)
          handler: handleBillGoalFulfilled
        - event: ScholarshipWithdrawal(indexed uint256,indexed address,indexed address,uint256,uint256,uint8,uint8)
          handler: handleScholarshipWithdrawal
        - event: GoalFlagged(indexed uint256,indexed address,uint8,bool,uint8,address,int256,string)
          handler: handleGoalFlagged
        - event: Refunded(indexed uint256,indexed address,uint256,indexed address,int256,string)
          handler: handleRefunded
        - event: ReputationUpdated(indexed address,int256,string)
          handler: handleReputationUpdated
      file: ./src/mapping.ts

